<!DOCTYPE html>
<html>
<head>
<style>
body{
    background:#050505;
    color:white;
    text-align:center;
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
}

.layout{
    display:flex;
    gap:20px;
    align-items:flex-start;
    justify-content:center;
}

.panel{
    width:720px;
}

.sidePreview{
    width:390px;
    position:sticky;
    top:20px;
}

h2{
    font-family:"Arial Black", Arial, sans-serif;
    letter-spacing:.5px;
}

.section{
    background:#111;
    border:1px solid #222;
    border-radius:16px;
    padding:16px;
    margin:14px 0;
}

input{
    padding:11px;
    border-radius:10px;
    border:1px solid #333;
    background:#070707;
    color:white;
    outline:none;
}

button{
    margin:4px;
    padding:11px 14px;
    border:none;
    border-radius:10px;
    font-weight:900;
    cursor:pointer;
    font-family:Arial, sans-serif;
}

.green{background:#2ec49a;color:black;}
.red{background:#ff3b3b;color:white;}
.blue{background:#1da1ff;color:white;}
.gold{background:#ffd34d;color:black;}
.purple{background:#8b5cf6;color:white;}
.dark{background:#222;color:white;}

.user{
    background:#0b0b0b;
    border:1px solid #252525;
    margin:8px 0;
    padding:12px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.userLeft{
    text-align:left;
    min-width:140px;
}

.userName{
    font-weight:900;
    font-size:16px;
}

.userCoins{
    color:#ffd34d;
    font-weight:900;
    margin-top:4px;
}

.userActions{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:6px;
    flex-wrap:wrap;
}

.coinInput{
    width:75px;
    padding:9px;
    border-radius:8px;
    border:1px solid #333;
    text-align:center;
    margin-left:4px;
}

.smallBtn{
    padding:9px 11px;
    font-size:13px;
}

#users{
    margin-top:10px;
}

/* AUCTION PREVIEW */
.previewBar{
    width:388px;
    height:56px;
    border-radius:12px;
    background:#050505;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:"Arial Black",Arial,sans-serif;
    font-size:18px;
    font-weight:900;
    margin-bottom:8px;
}

.previewGreen{
    border:2px solid #2ec49a;
    color:#2ec49a;
    font-size:20px;
    letter-spacing:1.8px;
    transform:scaleY(1.08);
}

.previewSnipeBar{
    border:2px solid #ff3b3b;
    color:white;
    position:relative;
}

.previewSnipeCenter{
    flex:1;
    text-align:center;
    padding-right:78px;
    font-size:18px;
    letter-spacing:0.3px;
    transform:scaleY(1.05);
}

.previewSnipeTime{
    position:absolute;
    right:48px;
    background:#ff4545;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    font-size:20px;
    font-family:"Arial Black",Arial,sans-serif;
    font-weight:900;
}

.previewCard{
    border:2px solid gold;
    border-radius:24px;
    padding:18px;
    background:#050505;
}

#previewTimer{
display:flex;
align-items:center;
justify-content:center;
gap:9px;
font-family:"Arial Black",Arial,sans-serif;
font-size:76px;
font-weight:900;
line-height:1;
letter-spacing:-3px;
color:#2ec49a;
font-variant-numeric:lining-nums tabular-nums;
text-shadow:none;
}
.previewColon{
display:flex;
flex-direction:column;
gap:13px;
position:relative;
top:1px;
}

.previewColon i{
width:13px;
height:13px;
border-radius:50%;
background:currentColor;
display:block;
}

#previewSnipeLine{
    display:none;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
    margin:8px 0 14px;
}

#previewSnipeLabel{
    font-family:"Arial Black",Arial,sans-serif;
    font-size:23px;
    font-weight:900;
    letter-spacing:.6px;
    transform:scaleY(1.08);
    color:#ff3b3b;
}

#previewSnipeSmallTime{
display:flex;
align-items:center;
justify-content:center;
gap:9px;
font-family:"Arial Black",Arial,sans-serif;
font-size:46px;
font-weight:900;
line-height:1;
letter-spacing:-3px;
color:#ff3b3b;
margin-left:10px;
}

#previewFinished{
    display:none;
    font-family:"Arial Black",Arial,sans-serif;
    font-size:28px;
    font-weight:900;
    letter-spacing:1.5px;
    transform:scaleY(1.08);
    line-height:1.02;
    color:#ff3b3b;
    margin:8px 0 14px;
}

.previewPlayer{
    display:flex;
    align-items:center;
    gap:12px;
    padding:8px 14px;
    margin:10px 0;
    border-radius:12px;
    min-height:66px;
}

.previewFirst{background:rgba(255,215,0,.22);border:2px solid #b88c00;}
.previewSecond{background:rgba(180,180,180,.18);border:2px solid #8f8f8f;}
.previewThird{background:rgba(155,90,35,.18);border:2px solid #9d5d25;}

.previewMedal{
    width:46px;
    text-align:center;
    font-size:34px;
    margin-right:6px;
}

.previewAvatar{
    width:46px;
    height:46px;
    border-radius:50%;
    object-fit:cover;
    background:#444;
}

.previewText{
    display:flex;
    flex-direction:column;
    text-align:left;
    min-width:0;
}

.previewUsername{
    font-family:"Arial","Helvetica Neue",sans-serif;
    font-size:18px;
    font-weight:900;
    color:#fff;
    letter-spacing:-0.5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:210px;
}

.previewCoins{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:"Arial Black", Arial, sans-serif;
    font-size:19px;
    font-weight:900;
    color:#fff;
}

.previewCoinIcon{
    width:21px;
    height:21px;
    object-fit:contain;
}

#previewParticipants{
    text-align:center;
    margin-top:12px;
    font-weight:700;
    background:#1a1a1a;
    padding:10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="layout">

<div class="panel">

<h2>🎮 CONTROL PANEL</h2>

<div class="section">
<input id="username" placeholder="tiktok username (no @)">
<button class="blue" onclick="connect()">Connect TikTok</button>
</div>

<div class="section">
<button class="green" onclick="start()">Start</button>
<button class="dark" onclick="pause()">Pause</button>
<button class="dark" onclick="resume()">Resume</button>
<button class="red" onclick="reset()">Reset</button>
</div>

<div class="section">
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(30)">+30s</button>
<button onclick="addTime(-10)">-10s</button>
<button onclick="addTime(-30)">-30s</button>
</div>

<div class="section">
<input id="user" placeholder="user">
<input id="coins" placeholder="coins">
<button class="gold" onclick="addUser()">Add User</button>
</div>

<div class="section">
<h3>👥 LIVE USERS</h3>
<div id="users"></div>
</div>

</div>

<div class="sidePreview">

<div class="previewBar previewGreen">✅ NO MINIMUM</div>

<div class="previewBar previewSnipeBar">
<div class="previewSnipeCenter">🛡️ SNIPE DELAY</div>
<span class="previewSnipeTime">20s</span>
</div>

<div class="previewCard">

<div id="previewTimer">
<span>1</span>
<span class="previewColon"><i></i><i></i></span>
<span>00</span>
</div>

<div id="previewSnipeLine">
<span id="previewSnipeLabel">🛡️ SNIPE DELAY:</span>
<span id="previewSnipeSmallTime">0:20</span>
</div>

<div id="previewFinished">
<div>TIMER</div>
<div>FINISHED</div>
</div>

<div id="previewLeaders"></div>
<div id="previewParticipants">👾 Participants: 0</div>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function connect(){
    let user = document.getElementById('username').value;
    socket.emit('connectTikTok', user);
}

socket.on('connected', () => alert("Connected to TikTok ✅"));
socket.on('failed', () => alert("Failed ❌ (Are you LIVE?)"));

function start(){ socket.emit('start'); }
function pause(){ socket.emit('pause'); }
function resume(){ socket.emit('resume'); }
function reset(){
    userOrder = [];
    socket.emit('reset');
}

function addTime(t){ socket.emit('addTime', t); }

function addUser(){
    let u = document.getElementById('user').value;
    let c = Number(document.getElementById('coins').value);
    socket.emit('addCoins',{user:u,amount:c});
}

function setCoins(user){
    const input = document.getElementById(`input-${safeId(user)}`);
    const amount = Number(input.value);

    if(!amount) return;

    socket.emit('addCoins',{user,amount});
    input.value = "";
}

function add500(user){
    socket.emit('addCoins',{user,amount:500});
}

function tieScore(user, currentCoins, topCoins){
    const needed = topCoins - currentCoins;
    if(needed <= 0) return;
    socket.emit('addCoins',{user,amount:needed});
}

function safeId(user){
    return user.replace(/[^a-zA-Z0-9_-]/g, "_");
}

function formatCoins(n){
    return Number(n).toLocaleString();
}

function formatTime(t){
    let m=Math.floor(t/60);
    let s=t%60;
    s = s<10 ? "0"+s : s;

    return `
    <span>${m}</span>
    <span class="previewColon">
        <i></i>
        <i></i>
    </span>
    <span>${s}</span>
    `;
}

function updatePreview(data){
    const timer = document.getElementById('previewTimer');
    const snipeLine = document.getElementById('previewSnipeLine');
    const snipeSmallTime = document.getElementById('previewSnipeSmallTime');
    const finished = document.getElementById('previewFinished');

    if(data.inSnipe && data.timer <= 0){
        timer.style.display = "none";
        snipeLine.style.display = "none";
        finished.style.display = "block";
    }
    else if(data.inSnipe){
    timer.style.display = "none";
    finished.style.display = "none";
    snipeLine.style.display = "flex";
    snipeSmallTime.innerHTML = formatTime(data.timer);
}
else{
    timer.style.display = "flex";
    snipeLine.style.display = "none";
    finished.style.display = "none";
    timer.innerHTML = formatTime(data.timer);
}

    const bids = data.bids || {};
    const avatars = data.avatars || {};
    const sorted = Object.entries(bids).sort((a,b)=>b[1]-a[1]);

    document.getElementById('previewLeaders').innerHTML =
    [0,1,2].map(i=>{
        let medal = ["🥇","🥈","🥉"][i];
        let cls = ["previewFirst","previewSecond","previewThird"][i];
        let x = sorted[i];

        if(!x){
            return `<div class="previewPlayer ${cls}">
                <div class="previewMedal">${medal}</div>
                <div class="previewAvatar"></div>
                <div class="previewText">
                    <div class="previewUsername">Waiting...</div>
                    <div class="previewCoins"><img src="tiktok.png" class="previewCoinIcon"> 0</div>
                </div>
            </div>`;
        }

        return `<div class="previewPlayer ${cls}">
            <div class="previewMedal">${medal}</div>
            <img src="${avatars[x[0]] || ''}" class="previewAvatar">
            <div class="previewText">
                <div class="previewUsername">${x[0]}</div>
                <div class="previewCoins"><img src="tiktok.png" class="previewCoinIcon"> ${formatCoins(x[1])}</div>
            </div>
        </div>`;
    }).join("");

    let count = data.count || Object.keys(bids).length;
    document.getElementById('previewParticipants').innerText = "👾 Participants: " + count;
}

let isTyping = false;
let userOrder = [];

socket.on('update', data => {

    updatePreview(data);

    if(isTyping) return;

    const usersDiv = document.getElementById('users');
    const bids = data.bids || {};

    Object.keys(bids).forEach(user => {
        if(!userOrder.includes(user)){
            userOrder.push(user);
        }
    });

    userOrder = userOrder.filter(user => bids[user] !== undefined);

    const topCoins = Object.values(bids).length ? Math.max(...Object.values(bids)) : 0;

    usersDiv.innerHTML = userOrder
        .map(u => {
            const c = bids[u];
            const id = safeId(u);

            return `
            <div class="user">
                <div class="userLeft">
                    <div class="userName">${u}</div>
                    <div class="userCoins">${c} 🪙</div>
                </div>

                <div class="userActions">
                    <button onclick="tieScore('${u}', ${c}, ${topCoins})" class="purple smallBtn">TIE</button>
                    <button onclick="add500('${u}')" class="gold smallBtn">+500</button>

                    <input 
                        type="number" 
                        id="input-${id}" 
                        placeholder="coins"
                        class="coinInput"
                        onfocus="isTyping=true"
                        onblur="setTimeout(()=>isTyping=false,200)"
                    >

                    <button onclick="setCoins('${u}')" class="blue smallBtn">ADD</button>
                </div>
            </div>
            `;
        }).join("");
});
</script>

</body>
</html>
