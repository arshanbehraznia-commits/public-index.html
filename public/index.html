<!DOCTYPE html>

<html>
<head>
<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:transparent;
    color:white;
    display:flex;
    justify-content:center;
    padding-top:10px;
}

.wrapper{
width:390px;
transform:scale(0.92);
transform-origin:top center;
}

.bar{
width:388px;
height:56px;
border-radius:12px;
background:#050505;
display:flex;
align-items:center;
justify-content:center;
font-family:"Arial Black",Arial,sans-serif;
font-size:18px;
font-weight:900;
letter-spacing:0.3px;
margin-bottom:8px;
text-shadow:none;
box-shadow:none;
}

.green{
border:1px solid #2ec49a;
color:#2ec49a;
font-size:20px;
letter-spacing:1.8px;
transform:scaleY(1.08);
}

#snipeBar{
border:1px solid #ff3b3b;
color:white;
position:relative;
}

#winnerCoins .coinIcon{
width:34px;
height:34px;
object-fit:contain;
position:relative;
top:2px;
}

#snipeCenter{
flex:1;
text-align:center;
padding-right:78px;
font-size:18px;
letter-spacing:0.3px;
transform:scaleY(1.05);
text-shadow:none;
}

#bgImage{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.25;
z-index:0;
}

#snipeTime{
position:absolute;
right:48px;
background:#ff4545;
color:white;
padding:8px 12px;
border-radius:8px;
font-size:20px;
font-family:"Arial Black",Arial,sans-serif;
font-weight:900;
text-shadow:none;
box-shadow:none;
}

.card{
border:1px solid #b88c00;
border-radius:24px;
padding:18px;
background:#050505;
position:relative;
}

#timer{
display:flex;
align-items:center;
justify-content:center;
gap:9px;

font-family:"Arial Black",Arial,sans-serif;
font-size:76px;
font-weight:900;
line-height:1;
letter-spacing:-3px;

color:#2ec49a;
font-variant-numeric:lining-nums tabular-nums;

text-shadow:none;
}
.colon{
display:flex;
flex-direction:column;
gap:13px;
position:relative;
top:1px;
}

.colon i{
width:8px;
height:8px;
border-radius:50%;
background:currentColor;
display:block;
}
.timer-red{
color:#ff3b3b !important;
text-shadow:none !important;
}

/* NEW: small snipe line inside auction box */
#snipeLine{
display:none;
align-items:center;
justify-content:center;
white-space:nowrap;
margin:8px 0 14px;
}

#snipeLabel{
font-family:"Arial Black",Arial,sans-serif;
font-size:23px;
font-weight:900;
letter-spacing:.6px;
transform:scaleY(1.08);
color:#ff3b3b;
}

#snipeSmallTime{
display:flex;
align-items:center;
justify-content:center;
gap:9px;
font-family:"Arial Black",Arial,sans-serif;
font-size:46px;
font-weight:900;
line-height:1;
letter-spacing:-3px;
color:#ff3b3b;
margin-left:10px;
text-shadow:none;
}

/* NEW: finished timer inside auction box */
#finishedTimer{
display:none;
font-family:"Arial Black",Arial,sans-serif;
font-size:28px;
font-weight:900;
letter-spacing:1.5px;
transform:scaleY(1.08);
line-height:1.02;
color:#ff3b3b;
text-align:center;
margin:8px 0 14px;
}

#finishedTimer .timerWord{
display:block;
width:fit-content;
margin:0 auto;
}

#bigSnipe{
display:none;
}

.player{
display:flex;
align-items:center;
gap:12px;
padding:8px 14px;
margin:10px 0;
border-radius:12px;
min-height:66px;
}

.first{
background:rgba(255,215,0,.22);
border:2px solid #b88c00;
}

.second{
background:rgba(180,180,180,.18);
border:2px solid #8f8f8f;
}

.third{
background:rgba(155,90,35,.18);
border:2px solid #9d5d25;
}

.medal{
width:46px;
text-align:center;
font-size:34px;
margin-right:6px;
}

.avatar{
width:46px;
height:46px;
border-radius:50%;
object-fit:cover;
background:#444;
border:none;
}

.text{display:flex;flex-direction:column;}

.username{
font-family:"Arial","Helvetica Neue",sans-serif;
font-size:18px;
font-weight:900;
color:#ffffff;
letter-spacing:-0.5px;
text-shadow:
0 0 2px rgba(255,255,255,.45),
0 0 4px rgba(255,255,255,.18);
}

.coins{
display:flex;
align-items:center;
gap:6px;
font-family:"Arial Black", Arial, sans-serif;
font-size:19px;
font-weight:900;
color:#ffffff;
text-shadow:
0 0 3px rgba(255,255,255,.4),
0 0 6px rgba(255,255,255,.15);
}

.coinIcon{
width:21px;
height:21px;
object-fit:contain;
}

#participants{
text-align:center;
margin-top:12px;
font-weight:700;
background:#1a1a1a;
padding:10px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

#winnerOverlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:24px;
background:linear-gradient(135deg,#2a003f,#6a00ff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
border:2px solid #a855f7;
box-shadow:
0 0 25px rgba(168,85,247,0.8),
inset 0 0 12px rgba(168,85,247,0.3);
opacity:0;
transition:.3s;
z-index:999;
}

#winnerTitle{
font-size:26px;
font-weight:900;
color:white;
letter-spacing:2px;
text-shadow:
0 0 8px rgba(255,255,255,0.8),
0 0 14px rgba(168,85,247,0.8);
margin-bottom:14px;
}

#winnerOverlay.show{opacity:1;}

#winnerAvatar{
width:90px;
height:90px;
border-radius:50%;
border:4px solid gold;
}

#winnerName{
font-size:26px;
font-weight:900;
color:#ffd700;
text-shadow:
0 0 8px rgba(255,215,0,0.9),
0 0 16px rgba(255,215,0,0.5);
}

#winnerCoins{
display:flex;
align-items:center;
gap:10px;
font-size:34px;
font-weight:900;
color:#ffd700;
text-shadow:
0 0 8px rgba(255,215,0,0.9),
0 0 16px rgba(255,215,0,0.5);
}

/* 🎉 CONFETTI */
#confetti{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
    z-index:1000;
}

.confetti-piece{
position:absolute;
width:6px;
height:12px;
opacity:0.9;
animation:fall linear forwards;
}

@keyframes fall{
from{
    transform:translateY(0) rotate(0deg);
}
to{
    transform:translateY(200px) rotate(720deg);
}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="bar green">✅ NO MINIMUM</div>

<div class="bar" id="snipeBar">
<div id="snipeCenter">🛡️ SNIPE DELAY</div>
<span id="snipeTime">20s</span>
</div>

<div class="card">

<div id="confetti"></div>

<div id="winnerOverlay">
<div id="winnerTitle">WINNER!</div>
<img id="winnerAvatar">
<div id="winnerName"></div>
<div id="winnerCoins"></div>
</div>

<div id="bigSnipe">🛡️ SNIPE DELAY</div>

<div id="timer">
<span>1</span>
<span class="colon"><i></i><i></i></span>
<span>00</span>
</div>
<div id="snipeLine">
<span id="snipeLabel">🛡️ SNIPE DELAY:</span>
<span id="snipeSmallTime">0:20</span>
</div>

<div id="finishedTimer">
<div class="timerWord">TIMER</div>
<div>FINISHED</div>
</div>

<div id="leaders"></div>
<div id="participants">👾 Participants: 0</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let avatars = {};

let confettiInterval;

function launchConfetti(){
const container = document.getElementById('confetti');
const colors = ["#ffd700","#ff3b3b","#4dffb8","#a855f7","#ffffff","#00eaff"];

confettiInterval = setInterval(()=>{
for(let i=0;i<8;i++){
const piece = document.createElement("div");
piece.className = "confetti-piece";

piece.style.left = Math.random()*100 + "%";
piece.style.top = Math.random()*100 + "%";
piece.style.background = colors[Math.floor(Math.random()*colors.length)];
piece.style.animationDuration = (Math.random()*2 + 2) + "s";

container.appendChild(piece);
setTimeout(()=>piece.remove(),4000);
}
},150);
}

function stopConfetti(){
clearInterval(confettiInterval);
document.getElementById('confetti').innerHTML = "";
}

function formatCoins(n){
return Number(n).toLocaleString();
}

function formatTime(t){
let m=Math.floor(t/60);
let s=t%60;
s = s<10 ? "0"+s : s;

return `
<span>${m}</span>
<span class="colon">
<i></i>
<i></i>
</span>
<span>${s}</span>
`;
}

function resetBoard(){
document.getElementById('leaders').innerHTML =
[0,1,2].map(i=>{
let medal = ["🥇","🥈","🥉"][i];
let cls = ["first","second","third"][i];
return `<div class="player ${cls}">
<div class="medal">${medal}</div>
<div class="avatar"></div>
<div class="text">
<div class="username">Waiting...</div>
<div class="coins"><img src="tiktok.png" class="coinIcon"> 0</div>
</div></div>`;
}).join("");
}
resetBoard();

socket.on('update', data => {

avatars = data.avatars || {};

const timerEl = document.getElementById('timer');
const snipeLine = document.getElementById('snipeLine');
const snipeSmallTime = document.getElementById('snipeSmallTime');
const finishedTimer = document.getElementById('finishedTimer');

if(data.inSnipe && data.timer <= 0){
timerEl.style.display = "none";
snipeLine.style.display = "none";
finishedTimer.style.display = "block";
}
else if(data.inSnipe){
timerEl.style.display = "none";
finishedTimer.style.display = "none";
snipeLine.style.display = "flex";
snipeSmallTime.innerHTML = formatTime(data.timer);
}
else{
timerEl.style.display = "flex";
snipeLine.style.display = "none";
finishedTimer.style.display = "none";
timerEl.classList.remove('timer-red');
timerEl.innerHTML = formatTime(data.timer);
timerEl.style.fontSize = "76px";
}
if(data.inSnipe){
timerEl.classList.add('timer-red');
} else {
timerEl.classList.remove('timer-red');
}

let count = data.count || Object.keys(data.bids || {}).length;
document.getElementById('participants').innerText = "👾 Participants: " + count;

let sorted = Object.entries(data.bids || {}).sort((a,b)=>b[1]-a[1]);

document.getElementById('leaders').innerHTML =
[0,1,2].map(i=>{
let medal = ["🥇","🥈","🥉"][i];
let cls = ["first","second","third"][i];
let x = sorted[i];

if(!x){
return `<div class="player ${cls}">
<div class="medal">${medal}</div>
<div class="avatar"></div>
<div class="text">
<div class="username">Waiting...</div>
<div class="coins"><img src="tiktok.png" class="coinIcon"> 0</div>
</div></div>`;
}

return `<div class="player ${cls}">
<div class="medal">${medal}</div>
<img src="${avatars[x[0]] || ''}" class="avatar">
<div class="text">
<div class="username">${x[0]}</div>
<div class="coins"><img src="tiktok.png" class="coinIcon"> ${formatCoins(x[1])}</div>
</div>
</div>`;
}).join("");
});

socket.on('winner', w=>{
const overlay = document.getElementById('winnerOverlay');

document.getElementById('winnerName').innerText = w[0];
document.getElementById('winnerCoins').innerHTML =
`<img src="tiktok.png" class="coinIcon"> ${formatCoins(w[1])}`;
document.getElementById('winnerAvatar').src = avatars[w[0]] || "";

overlay.classList.add('show');

launchConfetti();

setTimeout(()=>{
overlay.classList.remove('show');
stopConfetti();
},4000);
});
</script>

</body>
</html>
