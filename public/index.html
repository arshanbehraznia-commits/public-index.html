<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:transparent;
    color:white;
    display:flex;
    justify-content:center;
    padding-top:6px;
}

/* DESIGN CHANGE */
.wrapper{
    width:390px;
}

/* DESIGN CHANGE */
.bar{
    padding:12px 16px;
    border-radius:14px;
    margin-bottom:8px;
    background:#050505;
    font-weight:1000;
    font-size:16px;
    text-align:center;
    letter-spacing:1px;
}

.green{
    border:2px solid #00ff9c;
    color:#00ff9c;
    text-shadow:0 0 8px rgba(0,255,156,0.35);
    box-shadow:none;
}

/* DESIGN CHANGE */
#snipeBar{
    border:2px solid #ff3b3b;
    display:flex;
    align-items:center;
    padding:12px 16px;
    border-radius:14px;
    background:#050505;
    font-weight:1000;
    font-size:16px;
    box-shadow:none;
    position:relative;
}

#winnerCoins .coinIcon{
    width:34px;
    height:34px;
    object-fit:contain;
    position:relative;
    top:2px;
}

#snipeCenter{
    flex:1;
    text-align:center;
    letter-spacing:1.2px;
    text-shadow:none;
}

#bgImage{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.25;
    z-index:0;
}

/* DESIGN CHANGE */
#snipeTime{
    position:absolute;
    right:14px;
    background:#ff3b3b;
    padding:7px 13px;
    border-radius:9px;
    font-size:19px;
    font-weight:1000;
}

/* DESIGN CHANGE */
.card{
    border:2px solid #d8b300;
    border-radius:17px;
    padding:0 14px 14px;
    background:#050505;
    position:relative;
    overflow:hidden;
}

/* DESIGN CHANGE */
#timer{
font-family:Arial Rounded MT Bold, Arial, sans-serif;
font-size:56px;
line-height:1;
text-align:center;
font-weight:1000;
color:#25e0a5;
letter-spacing:2px;
padding:18px 0 17px;
margin:0 -14px 12px;
border-bottom:1px solid rgba(216,179,0,0.55);
text-shadow:
0 0 8px rgba(37,224,165,.65),
0 0 18px rgba(37,224,165,.35);
}
.timer-red{
    color:#ff3b3b !important;
    text-shadow:none !important;
}

#bigSnipe{
    text-align:center;
    font-size:20px;
    font-weight:900;
    color:#ff3b3b;
    display:none;
    margin-top:10px;
}

/* DESIGN CHANGE */
.player{
    position:relative;
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 12px;
    margin:9px 0;
    border-radius:10px;
    overflow:hidden;
    min-height:70px;
}

.first{
    background:rgba(255,215,0,0.24);
    border:1.5px solid rgba(255,215,0,0.85);
    box-shadow:none;
}

.second{
    background:rgba(200,200,200,0.16);
    border:1.5px solid rgba(220,220,220,0.75);
    box-shadow:none;
}

.third{
    background:rgba(205,127,50,0.16);
    border:1.5px solid rgba(205,127,50,0.8);
    box-shadow:none;
}

/* DESIGN CHANGE */
.medal{
    width:36px;
    text-align:center;
    font-size:25px;
}

/* DESIGN CHANGE */
.avatar{
    width:54px;
    height:54px;
    border-radius:50%;
    background:#444;
    object-fit:cover;
    border:3px solid rgba(120,110,255,0.65);
}

/* DESIGN CHANGE */
.text{
    display:flex;
    flex-direction:column;
    min-width:0;
}

.username{
    font-weight:1000;
    font-size:19px;
    line-height:1.1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:230px;
}

/* DESIGN CHANGE */
.coins{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-weight:1000;
    font-size:20px;
    color:#fff;
    margin-top:5px;
    text-shadow:
    0 0 6px rgba(255,215,0,0.7),
    0 0 12px rgba(255,215,0,0.35);
}

/* DESIGN CHANGE */
.coinIcon{
    width:17px;
    height:17px;
    object-fit:contain;
}

/* DESIGN CHANGE */
#participants{
    text-align:center;
    margin-top:10px;
    font-weight:900;
    font-size:16px;
    background:#030303;
    padding:11px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.16);
}

#winnerOverlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:17px;
    background:linear-gradient(135deg,#2a003f,#6a00ff);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
    border:2px solid #a855f7;
    box-shadow:
    0 0 25px rgba(168,85,247,0.8),
    inset 0 0 12px rgba(168,85,247,0.3);
    opacity:0;
    transition:.3s;
    z-index:999;
}

#winnerTitle{
    font-size:26px;
    font-weight:900;
    color:white;
    letter-spacing:2px;
    text-shadow:
    0 0 8px rgba(255,255,255,0.8),
    0 0 14px rgba(168,85,247,0.8);
    margin-bottom:14px;
}

#winnerOverlay.show{opacity:1;}

#winnerAvatar{
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid gold;
}

#winnerName{
    font-size:26px;
    font-weight:900;
    color:#ffd700;
    text-shadow:
    0 0 8px rgba(255,215,0,0.9),
    0 0 16px rgba(255,215,0,0.5);
}

#winnerCoins{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:34px;
    font-weight:900;
    color:#ffd700;
    text-shadow:
    0 0 8px rgba(255,215,0,0.9),
    0 0 16px rgba(255,215,0,0.5);
}

/* 🎉 CONFETTI */
#confetti{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
    z-index:1000;
}

.confetti-piece{
    position:absolute;
    width:6px;
    height:12px;
    opacity:0.9;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(0) rotate(0deg);
    }
    to{
        transform:translateY(200px) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="bar green">✅ NO MINIMUM</div>

<div class="bar" id="snipeBar">
<div id="snipeCenter">🛡️ SNIPE DELAY</div>
<span id="snipeTime">20s</span>
</div>

<div class="card">

<div id="confetti"></div>

<div id="winnerOverlay">
<div id="winnerTitle">WINNER!</div>
<img id="winnerAvatar">
<div id="winnerName"></div>
<div id="winnerCoins"></div>
</div>

<div id="bigSnipe">🛡️ SNIPE DELAY</div>
<div id="timer">1:00</div>
<div id="leaders"></div>
<div id="participants">Participants: 0</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let avatars = {};

let confettiInterval;

function launchConfetti(){
const container = document.getElementById('confetti');
const colors = ["#ffd700","#ff3b3b","#4dffb8","#a855f7","#ffffff","#00eaff"];

confettiInterval = setInterval(()=>{
for(let i=0;i<8;i++){
const piece = document.createElement("div");
piece.className = "confetti-piece";

piece.style.left = Math.random()*100 + "%";
piece.style.top = Math.random()*100 + "%";
piece.style.background = colors[Math.floor(Math.random()*colors.length)];
piece.style.animationDuration = (Math.random()*2 + 2) + "s";

container.appendChild(piece);
setTimeout(()=>piece.remove(),4000);
}
},150);
}

function stopConfetti(){
clearInterval(confettiInterval);
document.getElementById('confetti').innerHTML = "";
}

function formatCoins(n){
return Number(n).toLocaleString();
}

function formatTime(t){
let m=Math.floor(t/60), s=t%60;
return m+":"+(s<10?"0"+s:s);
}

function resetBoard(){
document.getElementById('leaders').innerHTML =
[0,1,2].map(i=>{
let medal = ["🥇","🥈","🥉"][i];
let cls = ["first","second","third"][i];
return `<div class="player ${cls}">
<div class="medal">${medal}</div>
<div class="avatar"></div>
<div class="text">
<div class="username">Waiting...</div>
<div class="coins"><img src="tiktok.png" class="coinIcon"> 0</div>
</div></div>`;
}).join("");
}
resetBoard();

socket.on('update', data => {

avatars = data.avatars || {};

const timerEl = document.getElementById('timer');

if(data.inSnipe && data.timer <= 0){
timerEl.innerText = "TIMER FINISHED";
timerEl.style.textShadow = "none";
timerEl.style.fontSize = "28px";
timerEl.style.letterSpacing = "1px";
} else {
timerEl.innerText = formatTime(data.timer);
timerEl.style.fontSize = "56px";
}

if(data.inSnipe){
timerEl.classList.add('timer-red');

if(data.timer > 0){
document.getElementById('bigSnipe').style.display = "block";
} else {
document.getElementById('bigSnipe').style.display = "none";
}

} else {
timerEl.classList.remove('timer-red');
document.getElementById('bigSnipe').style.display = "none";
}

let count = data.count || Object.keys(data.bids || {}).length;
document.getElementById('participants').innerText = "Participants: " + count;

let sorted = Object.entries(data.bids || {}).sort((a,b)=>b[1]-a[1]);

document.getElementById('leaders').innerHTML =
[0,1,2].map(i=>{
let medal = ["🥇","🥈","🥉"][i];
let cls = ["first","second","third"][i];
let x = sorted[i];

if(!x){
return `<div class="player ${cls}">
<div class="medal">${medal}</div>
<div class="avatar"></div>
<div class="text">
<div class="username">Waiting...</div>
<div class="coins"><img src="tiktok.png" class="coinIcon"> 0</div>
</div></div>`;
}

return `<div class="player ${cls}">
<div class="medal">${medal}</div>
<img src="${avatars[x[0]] || ''}" class="avatar">
<div class="text">
<div class="username">${x[0]}</div>
<div class="coins"><img src="tiktok.png" class="coinIcon"> ${formatCoins(x[1])}</div>
</div>
</div>`;
}).join("");
});

socket.on('winner', w=>{
const overlay = document.getElementById('winnerOverlay');

document.getElementById('winnerName').innerText = w[0];
document.getElementById('winnerCoins').innerHTML =
`<img src="tiktok.png" class="coinIcon"> ${formatCoins(w[1])}`;
document.getElementById('winnerAvatar').src = avatars[w[0]] || "";

overlay.classList.add('show');

launchConfetti();

setTimeout(()=>{
overlay.classList.remove('show');
stopConfetti();
},4000);
});
</script>

</body>
</html>
